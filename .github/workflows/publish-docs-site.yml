name: Publish docs-site

on:
  push:
    branches:
      - "**"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  publish:
    # Keep the workflow branch-aware without hard-coding the default branch name.
    # Any non-default branch listed here must also be allowed by the
    # repository's `github-pages` environment deployment branch rules.
    if: github.ref_name == github.event.repository.default_branch || github.ref_name == 'front-end-docs'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"

      - name: Install Bundler
        working-directory: docs-site
        run: gem install bundler -v 2.6.9

      - name: Install Nanoc dependencies
        working-directory: docs-site
        run: |
          bundle install --jobs 4 --retry 3

      - name: Build docs site
        working-directory: docs-site
        run: |
          bundle exec nanoc compile

      - name: Download Mermaid asset
        working-directory: docs-site
        run: |
          mkdir -p output/assets/vendor/mermaid
          curl -L https://cdn.jsdelivr.net/npm/mermaid@11.14.0/dist/mermaid.min.js \
            -o output/assets/vendor/mermaid/mermaid-11.14.0.min.js
          echo "217b66ef4279c33c141b4afe22effad10a91c02558dc70917be2c0981e78ed87  output/assets/vendor/mermaid/mermaid-11.14.0.min.js" | sha256sum -c -
          touch output/.nojekyll

      - name: Verify Pages output
        working-directory: docs-site
        run: |
          test -d output
          test -f output/index.html
          test -f output/assets/vendor/mermaid/mermaid-11.14.0.min.js

      - name: Set up GitHub Pages
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: docs-site/output

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
